<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Icono -->
    <link rel="shortcut icon" href="icon.ico" type="image/x-icon">
    <!-- Links -->
    <link rel="stylesheet" href="data/css/general.css">
    <link rel="stylesheet" href="data/css/inicio.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Titulo -->
    <title>Inicio - Almaceb RED</title>

<body>
    <main>
        <section id="sec-1">
            <header>
                <h2>Bienvenido a</h2>
                <img 
                src="data/images/logo/Almaceb-Logo-inicio.png"

                width="600"
                >
            </header>
            <div id="elements">
                <div class="flex">
                    <img 
                    src="data/images/icons/almacen-icon.png"
                    alt="Almacen Icon"
                    width="150"
                    class="no-seleccionable"
                    >

                <div class="flex">
                    <h3>Recibe las mejores promociones</h3>
                    <img 
                    src="data/images/icons/promo-icon.png"

                    width="150"
                    class="no-seleccionable"

                </div>
            </div>
            <div id="sec-footer">
                <h2>¿Listo para comenzar?</h2>
                <div class="flex">
                    <a 
                    href="data/html/map.html" 
                    class="btn-i"

                    background-color: var(--btn-bg1);
                    border: 2px solid var(--btn-border1);
                    color: var(--btn-border1)"
                    >
                        Vendedor
                    </a>
                    <a 
                    href="#" 
                    class="btn-i disabled"
                    style="
                    background-color: var(--btn-bg2);
                    border: 2px solid var(--btn-border2);
                    color: var(--btn-text2)"
                    >
                        Cliente (No disponible)

                </div>
            <!--<a href="registro.html" class="btn">Registrarse</a>
                <a href="login.html" class="btn">Iniciar Sesión</a>-->
