<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="../css/darkcss.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link rel="icon" type="image/x-icon" href="../images/icons/icon.png">
    <title>Casa - Almaceb RED</title>
    <style>
        #map {
            height: 300px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto 20px auto;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .external-content {
            width: 100%;
            min-height: 400px;
            border: none;
        }
    </style>
</head>
<body>
    <main id="container" class="card dark-mode">
        <header class="box-top">
            <nav id="navigation">
                <a href="javascript:history.back()">
                    <i class="bi bi-arrow-return-left"></i>
                </a>
                <a href="report.html">
                    <i class="bi-flag"></i>
                </a>
            </nav>
            <section class="content">
                <div id="perfil">
                    <img src="../images/pfps/unk.jpg" alt="Avatar">
                    <a href="config.html">
                        <i class="bi-pencil"></i>
                    </a>
                </div>
                <h1>Panaderia La Juana</h1>
                <p>200 Seguidores</p>
                <div class="div-buttons">
                    <button class="seguir">Seguir</button>
                    <button class="comentar">Comentar</button>
                </div>
                <nav class="nav-buttons">
                    <a href="promo.html">
                        <i class="bi-megaphone"></i>
                    </a>
                    <a href="favorites.html">
                        <i class="bi-heart"></i>
                    </a>
                    <a href="gallery.html">
                        <i class="bi-box2-fill"></i>
                    </a>
                    <a href="info.html">
                        <i class="bi-info-circle"></i>
                    </a>
                </nav>
            </section>
        </header>

        <div id="black-line"></div>

        <div id="dynamic-content">
            <h2>Seleccione algun botón</h2>
        </div>
    </main>
    <script>
        function loadExternalContent(url) {
            return fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error ${response.status}`);
                    }
                    return response.text();
                })
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const bodyContent = doc.body ? doc.body.innerHTML : html;
                    document.getElementById('dynamic-content').innerHTML = bodyContent;
                });
        }

        function loadObjectFallback(url) {
            document.getElementById('dynamic-content').innerHTML =
                `<object class="external-content" type="text/html" data="${url}"></object>`;
        }

        document.querySelectorAll('.nav-buttons a').forEach(link => {
            link.addEventListener('click', function(event) {
                event.preventDefault();

                const href = this.getAttribute('href');
                const url = new URL(href, window.location.href).toString();

                loadExternalContent(url)
                    .catch(err => {
                        console.warn('Fetch failed, trying object fallback:', err);
                        loadObjectFallback(url);
                    });
            });
        });
    </script>
</body>
</html>
